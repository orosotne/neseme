<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="robots" content="noindex, follow" />
  <title>Stránka nenájdená — Neseme</title>
  <meta name="description" content="Stránka, ktorú ste hľadali, neexistuje. Vráťte sa na hlavnú stránku Neseme alebo nás kontaktujte." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700;900&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --c-primary: #111111;
      --c-secondary: #FA5400;
      --c-bg: #FFFFFF;
      --c-text-secondary: #707072;
      --font-display: 'Jost', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--c-primary);
      color: var(--c-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '404';
      position: absolute;
      bottom: -20%;
      right: -10%;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(280px, 45vw, 720px);
      color: rgba(250,84,0,0.06);
      letter-spacing: -0.04em;
      line-height: 0.85;
      pointer-events: none;
      user-select: none;
    }
    .container {
      max-width: 720px;
      position: relative;
      z-index: 1;
      text-align: left;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-secondary);
      margin-bottom: 24px;
    }
    .eyebrow::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--c-secondary);
    }
    h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(56px, 9vw, 120px);
      line-height: 1.0;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      padding-top: 0.18em;
      margin-bottom: 24px;
    }
    h1 .o { color: var(--c-secondary); }
    p {
      font-size: 17px;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      max-width: 560px;
      margin-bottom: 32px;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 28px;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border-radius: 30px;
      transition: all 200ms var(--ease);
      text-decoration: none;
    }
    .btn-primary {
      background: var(--c-secondary);
      color: var(--c-bg);
    }
    .btn-primary:hover { background: #d94900; transform: translateY(-2px); }
    .btn-ghost {
      background: transparent;
      color: var(--c-bg);
      border: 1px solid rgba(255,255,255,0.4);
    }
    .btn-ghost:hover {
      background: var(--c-bg);
      color: var(--c-primary);
    }
    .btn svg { transition: transform 200ms var(--ease); }
    .btn:hover svg { transform: translateX(4px); }
    .meta {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .meta a {
      color: var(--c-bg);
      text-decoration: none;
      transition: color 200ms var(--ease);
    }
    .meta a:hover { color: var(--c-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Chyba 404</div>
    <h1>Táto cesta<br><span class="o">nikam nevedie.</span></h1>
    <p>
      Stránka, ktorú hľadáte, neexistuje alebo bola presunutá. Vráťte sa na hlavnú stránku, alebo nám napíšte — pomôžeme vám nájsť, čo potrebujete.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        Späť na hlavnú
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="/kontakt.html" class="btn btn-ghost">Kontakt</a>
    </div>
    <div class="meta">
      <a href="tel:+421917588738">+421 917 588 738</a>
      <a href="mailto:doprava@neseme.sk">doprava@neseme.sk</a>
      <span>Po–Ne · 7:00–21:00</span>
    </div>
  </div>
</body>
</html>
