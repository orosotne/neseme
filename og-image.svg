<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="og-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <linearGradient id="og-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(250,84,0,0)"/>
      <stop offset="100%" stop-color="rgba(250,84,0,0.5)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-dots)"/>

  <!-- Giant background NESEME -->
  <text x="600" y="540" text-anchor="middle"
        font-family="Jost, system-ui, sans-serif"
        font-weight="900"
        font-size="540"
        letter-spacing="-22"
        fill="rgba(250,84,0,0.06)">NESEME</text>

  <!-- Speed lines top-left -->
  <line x1="60" y1="100" x2="200" y2="100" stroke="rgba(250,84,0,0.4)" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="130" x2="240" y2="130" stroke="rgba(250,84,0,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="160" x2="180" y2="160" stroke="rgba(250,84,0,0.3)" stroke-width="3" stroke-linecap="round"/>

  <!-- Logo mark (swoosh) -->
  <g transform="translate(70 70)">
    <path d="M0 28 L 10 0 L 56 0 L 56 12 L 46 40 L 0 40 Z" fill="#FA5400"/>
  </g>
  <text x="138" y="103"
        font-family="Jost, system-ui, sans-serif"
        font-weight="900"
        font-size="32"
        letter-spacing="-0.5"
        fill="#FFFFFF">NESEME</text>

  <!-- Eyebrow -->
  <line x1="70" y1="220" x2="110" y2="220" stroke="#FA5400" stroke-width="2"/>
  <text x="120" y="225"
        font-family="JetBrains Mono, monospace"
        font-size="18"
        letter-spacing="2"
        fill="#FA5400">XL DOPRAVA · BRATISLAVA</text>

  <!-- Main headline -->
  <text x="70" y="320"
        font-family="Jost, system-ui, sans-serif"
        font-weight="900"
        font-size="98"
        letter-spacing="-3"
        fill="#FFFFFF">VEĽKÉ VECI</text>
  <text x="70" y="420"
        font-family="Jost, system-ui, sans-serif"
        font-weight="900"
        font-size="98"
        letter-spacing="-3"
        fill="#FFFFFF">AŽ K VÁM <tspan fill="#FA5400">DOMOV.</tspan></text>

  <!-- Sub-line -->
  <text x="70" y="490"
        font-family="Jost, system-ui, sans-serif"
        font-weight="700"
        font-size="22"
        letter-spacing="3"
        fill="rgba(255,255,255,0.7)">DOVEZIEME · VYNESIEME · ZAPOJÍME</text>

  <!-- Bottom right CTA pill -->
  <g transform="translate(900 540)">
    <rect x="-160" y="-30" width="240" height="60" rx="30" fill="#FA5400"/>
    <text x="-40" y="6" text-anchor="middle"
          font-family="Jost, system-ui, sans-serif"
          font-weight="700"
          font-size="18"
          letter-spacing="1"
          fill="#FFFFFF">NESEME.SK</text>
  </g>

  <!-- Phone bottom-left -->
  <text x="70" y="570"
        font-family="JetBrains Mono, monospace"
        font-size="16"
        letter-spacing="1.5"
        fill="rgba(255,255,255,0.6)">+421 917 588 738 · AHOJ@NESEME.SK</text>

  <!-- Decorative speed line bottom -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="url(#og-fade)" stroke-width="2"/>
</svg>
